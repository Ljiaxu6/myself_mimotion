name: run-mimotion

on:
  schedule:
    - cron: "0 0 * * *"  # 北京时间 08:00 (UTC+8)
    - cron: "0 6 * * *"  # 北京时间 14:00 (UTC+8)
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          MI_ACCOUNTS: ${{ secrets.MI_ACCOUNTS }}
          WECHAT_WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
          STEP_RANGE: ${{ secrets.STEP_RANGE }}
        run: |
          python "main_ mimotion.py"

name: run-mimotion

on:
  schedule:
    - cron: "0 0 * * *" # 北京时间 08:00 (UTC+8)
    - cron: "0 2 * * *" # 北京时间 10:00 (UTC+8)
    - cron: "0 7 * * *" # 北京时间 15:00 (UTC+8)
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore run cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: mimotion-cache-${{ github.repository }}

      - name: Run script
        env:
          MI_ACCOUNTS: ${{ secrets.MI_ACCOUNTS }}
          RUN_RANGES: ${{ secrets.RUN_RANGES }}
          RUN_STATE_PATH: .cache/run_state.json
          TOKEN_CACHE_PATH: .cache/token_cache.json
        run: |
          python "main_ mimotion.py"

name: run-mimotion

on:
  schedule:
    - cron: "0 16,19,21 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore run cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: mimotion-cache-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            mimotion-cache-${{ github.repository }}-

      - name: Run script
        env:
          MI_ACCOUNTS: ${{ secrets.MI_ACCOUNTS }}
          RUN_RANGES: ${{ secrets.RUN_RANGES }}
          WECHAT_WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
          RUN_STATE_PATH: .cache/run_state.json
          TOKEN_CACHE_PATH: .cache/token_cache.json
        run: |
          python "main_ mimotion.py"
